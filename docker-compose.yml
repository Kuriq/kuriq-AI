services:
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8002:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/heartbeat')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  kuriq-data:
    build:
      context: ../kuriq-data
    depends_on:
      chroma:
        condition: service_healthy
    ports:
      - "8001:8001"
    environment:
      DATA_GO_KR_API_KEY: ${DATA_GO_KR_API_KEY}
      KOCW_API_KEY: ${KOCW_API_KEY:-}
      CHROMA_MODE: server
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

  kuriq-ai:
    build:
      context: .
    depends_on:
      chroma:
        condition: service_healthy
      kuriq-data:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      INTERNAL_SECRET_KEY: ${INTERNAL_SECRET_KEY:-dev-secret}
      CRAWLER_DATA_BASE_URL: http://kuriq-data:8001
      CRAWLER_DATA_TIMEOUT: ${CRAWLER_DATA_TIMEOUT:-30}
      CHROMA_MODE: server
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/internal/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chroma_data:
